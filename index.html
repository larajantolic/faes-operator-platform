<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Instruction Library | FAES Operator Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="app-shell">

    <aside class="sidebar" aria-label="Primary navigation">
      <button class="sidebar-collapse-button" type="button" aria-label="Open navigation">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 7L13 12L8 17"></path>
          <path d="M16 7L21 12L16 17"></path>
        </svg>
      </button>

      <nav class="sidebar-navigation">
        <a class="sidebar-link sidebar-link--active" href="#" aria-label="Instruction Library">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 3H14L19 8V20C19 20.55 18.55 21 18 21H7C6.45 21 6 20.55 6 20V4C6 3.45 6.45 3 7 3Z"></path>
            <path d="M14 3V8H19"></path>
            <path d="M9 12H16"></path>
            <path d="M9 16H16"></path>
          </svg>
        </a>

        <a class="sidebar-link" href="#" aria-label="My Reports">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 4V20"></path>
            <path d="M5 5H16L14 10L18 15H5"></path>
          </svg>
        </a>

        <a class="sidebar-link" href="#" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15A1.7 1.7 0 0 0 19.74 16.88L19.8 16.94L17.94 18.8L17.88 18.74A1.7 1.7 0 0 0 16 18.4A1.7 1.7 0 0 0 15 20V20.1H12.4V20A1.7 1.7 0 0 0 11 18.4A1.7 1.7 0 0 0 9.12 18.74L9.06 18.8L7.2 16.94L7.26 16.88A1.7 1.7 0 0 0 7.6 15A1.7 1.7 0 0 0 6 14H5.9V11.4H6A1.7 1.7 0 0 0 7.6 10A1.7 1.7 0 0 0 7.26 8.12L7.2 8.06L9.06 6.2L9.12 6.26A1.7 1.7 0 0 0 11 6.6A1.7 1.7 0 0 0 12 5V4.9H14.6V5A1.7 1.7 0 0 0 16 6.6A1.7 1.7 0 0 0 17.88 6.26L17.94 6.2L19.8 8.06L19.74 8.12A1.7 1.7 0 0 0 19.4 10A1.7 1.7 0 0 0 21 11.4H21.1V14H21A1.7 1.7 0 0 0 19.4 15Z"></path>
          </svg>
        </a>
      </nav>

      <a class="sidebar-link sidebar-link--logout" href="#" aria-label="Log out">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14 8L18 12L14 16"></path>
          <path d="M18 12H7"></path>
          <path d="M10 4H5C4.45 4 4 4.45 4 5V19C4 19.55 4.45 20 5 20H10"></path>
        </svg>
      </a>
    </aside>

    <div class="main-area">
      <header class="top-header">
        <h1>Instruction Library</h1>
      </header>

      <main class="library-page">
        <section class="library-search-section" aria-label="Search instructions">
          <label class="search-field">
            <span class="visually-hidden">Search product or instruction</span>

            <input
              type="search"
              placeholder="Search product or instruction..."
              aria-label="Search product or instruction"
            >

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="5.5"></circle>
              <path d="M15.2 15.2L19 19"></path>
            </svg>
          </label>
        </section>

        <section class="instruction-grid" aria-label="Available instructions">
          <!-- Cards come in the next coding step -->
        </section>
      </main>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
